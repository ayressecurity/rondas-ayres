<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR de enrolamiento — {{ instalacion.nombre }}</title>
    <style>
        body { font-family: "Exo", Arial, sans-serif; color: #333; text-align: center; margin: 2rem; }
        h1 { font-size: 1.4rem; }
        .codigo { color: #666; margin-bottom: 1.5rem; }
        img { width: 320px; max-width: 90vw; height: auto; }
        .ayuda { color: #666; max-width: 420px; margin: 1.5rem auto; font-size: .95rem; }
        .btn-print {
            background: #CC3333; color: #fff; border: 0; padding: .6rem 1.4rem;
            border-radius: 4px; cursor: pointer; font-size: 1rem;
        }
        @media print { .btn-print { display: none; } body { margin: 0; } }
    </style>
</head>
<body>
    <h1>{{ instalacion.nombre }}</h1>
    <p class="codigo">{{ instalacion.codigo }} · QR de enrolamiento</p>
    <img src="{{ qr }}" alt="QR de enrolamiento">
    <p class="ayuda">
        Escanea este código desde la app de Rondas para enrolar el teléfono en esta instalación.
    </p>
    <button type="button" class="btn-print" onclick="window.print()">Imprimir</button>
</body>
</html>
