<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Imprimir QR — {{ instalacion_nombre }}</title>
    <style>
        :root { --rojo: #CC3333; --oscuro: #333333; --gris: #ccc; }
        * { box-sizing: border-box; }
        body {
            font-family: "Exo", Arial, sans-serif;
            margin: 0;
            color: var(--oscuro);
            background: #f3f3f3;
        }

        /* Barra de acciones (no se imprime). */
        .barra {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 18px;
            background: var(--oscuro);
            color: #fff;
        }
        .barra h1 { font-size: 1rem; margin: 0; font-weight: 600; }
        .barra .sub { font-weight: 400; opacity: 0.85; }
        .btn-imprimir {
            background: var(--rojo);
            color: #fff;
            border: none;
            padding: 9px 18px;
            border-radius: 6px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-imprimir:hover { background: #b32d2d; }

        /* Hoja = una página: grilla 3 columnas x 3 filas (9 QR). */
        .hoja {
            background: #fff;
            margin: 14px auto;
            padding: 8mm;
            width: 210mm;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(4, 1fr);   /* 4 columnas */
            grid-auto-rows: 36mm;                     /* 7 filas de 36mm = 4x7 por hoja */
            gap: 3mm;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
        }
        .celda {
            border: 1px dashed var(--gris);   /* guía de recorte (también en slots vacíos) */
            border-radius: 5px;
            padding: 2mm;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            break-inside: avoid;
            overflow: hidden;
        }
        .celda img {
            width: 25mm;                  /* tamaño para que entren 28 nítidos en A4 */
            height: 25mm;
            image-rendering: pixelated;   /* QR nítido, sin difuminar al escalar */
        }
        .celda .nombre {
            margin-bottom: 1.5mm;         /* nombre ARRIBA del QR */
            font-weight: 600;
            font-size: 0.62rem;
            line-height: 1.05;
            word-break: break-word;
            max-height: 7mm;
            overflow: hidden;
        }
        .celda-vacia { background: #fafafa; }   /* slot sin QR: visible pero vacío */
        .vacio { padding: 40px; text-align: center; color: #666; }

        @page { size: A4; margin: 8mm; }
        @media print {
            body { background: #fff; }
            .barra { display: none; }
            .hoja {
                margin: 0;
                width: auto;
                box-shadow: none;
                padding: 0;
                page-break-after: always;
            }
            .hoja:last-child { page-break-after: auto; }
        }
    </style>
</head>
<body>
    <div class="barra">
        <h1>Códigos QR — <span class="sub">{{ instalacion_nombre }}</span></h1>
        <button type="button" class="btn-imprimir" onclick="window.print()">Imprimir</button>
    </div>

    {% for pagina in paginas %}
        <section class="hoja">
            {% for item in pagina %}
                {% if item %}
                    <div class="celda">
                        <span class="nombre">{{ item.nombre }}</span>
                        <img src="{{ item.qr }}" alt="QR {{ item.nombre }}">
                    </div>
                {% else %}
                    <div class="celda celda-vacia"></div>
                {% endif %}
            {% endfor %}
        </section>
    {% empty %}
        <p class="vacio">No hay puntos de control activos en esta instalación.</p>
    {% endfor %}
</body>
</html>
